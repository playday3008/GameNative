name: Debug APK Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'master'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Inject credentials
      run: |
        printf '%s\n' \
          "POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}" \
          "POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}" \
          "STEAMGRIDDB_API_KEY=${{ secrets.STEAMGRIDDB_API_KEY }}" \
          "CLOUD_PROJECT_NUMBER=${{ secrets.CLOUD_PROJECT_NUMBER }}" \
          > local.properties

    - name: Add .dev suffix to debug package name
      run: |
        sed -i '/debug {/,/}/ s|signingConfig = signingConfigs.getByName("debug")|signingConfig = signingConfigs.getByName("debug")\n            applicationIdSuffix = ".dev"|' app/build.gradle.kts

    - name: Build debug APK
      run: ./gradlew :app:assembleDebug

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ inputs.branch }}
        path: app/build/outputs/apk/debug/app-debug.apk
